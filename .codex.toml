[repository]
name = "codex-agent-lab"
purpose = "Codex를 기반으로 반복 문서 업무와 운영 업무를 자동화하기 위한 에이전트를 만드는 스터디 저장소"
visibility = "public"
language = "ko"
core_agent = "agents/00-agent-harness-translator"
target_audience = ["비전공 대학생", "직장인", "업무 자동화 수강생", "운영 담당자"]
explanation_style = "파인만 학습법처럼 어려운 용어를 쉬운 말과 일상 업무 예시로 설명"

[defaults]
base_agent = "codex"
status = "idea"
human_review_required = true
external_actions_default = "dry_run"
output_mode = "draft"
design_first_agent = "00-agent-harness-translator"

[harness_translation]
template = "agents/00-agent-harness-translator/templates/harness-parts-spec.md"
memory_policy = "docs/codex-memory-policy.md"
required_axes = ["instruction", "knowledge_state", "capability_action", "control_crosscutting"]
required_parts = [
  "system_prompt",
  "input_prompt",
  "memory",
  "skill",
  "mcp_tool",
  "subagent",
  "hook"
]
must_define = ["input", "output", "failure_modes", "invariants"]
memory_must_define = [
  "memory_purpose",
  "memory_candidates",
  "never_store",
  "storage_location",
  "write_timing",
  "read_timing",
  "source_of_truth",
  "review_and_delete"
]
empty_failure_modes_or_invariants = "design_defect_candidate"

[folder_contract]
required_files = ["AGENTS.md", ".codex.toml"]
optional_dirs = ["prompts", "templates", "examples", "scripts", "tests", "docs"]

[security]
never_commit = [
  ".env",
  "credentials",
  "api_keys",
  "tokens",
  "cookies",
  "customer_documents",
  "employee_payroll",
  "tax_invoices",
  "contracts",
  "naver_works_exports",
  "reporter_contacts",
  "private_crawled_data"
]
requires_human_approval = [
  "send_email",
  "send_message",
  "upload_file",
  "publish_post",
  "crawl_logged_in_site",
  "use_browser_session",
  "connect_naver_works",
  "distribute_press_release"
]

[review]
idea_review_checklist = "docs/idea-review-checklist.md"
security_policy = "docs/security-and-privacy.md"
