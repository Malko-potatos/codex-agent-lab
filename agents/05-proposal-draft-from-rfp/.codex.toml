[agent]
id = "05-proposal-draft-from-rfp"
name = "RFP/과업지시서와 기존 제안서 기반 제안서 초안"
status = "idea"
base = "codex"
visibility = "public-skeleton-only"

[scope]
goal = "요구사항과 기존 스타일을 반영한 제안서 초안을 생성한다."
target_users = ["제안 담당자", "사업개발 담당자", "대표"]
non_goals = ["기존 제안서 무단 복제", "허위 실적 작성", "RFP 원문 공개 저장"]

[inputs]
required = ["RFP 또는 과업지시서", "제안 주제", "회사 강점"]
optional = ["기존 제안서 샘플", "평가표", "일정", "예산"]
sensitive = ["RFP 원문", "기존 제안서", "내부 전략", "고객 정보"]

[outputs]
primary = ["요구사항 분석표", "제안서 목차", "제안서 초안", "누락 체크리스트"]
formats = ["markdown", "docx-draft", "hwp-future"]

[tools]
required = ["document_analysis", "local_document_generation"]
optional = ["pdf_parser", "hwp_converter"]
external_services = []

[safety]
human_review_required = true
external_actions_default = "dry_run"
approval_required_for = ["use_private_proposal", "upload_file", "external_model_processing"]
data_policy = "Do not commit RFPs, statement of work files, existing proposals, or customer strategy."

[workflow]
steps = ["extract_requirements", "map_strengths", "build_outline", "draft_proposal", "check_compliance"]
validation = ["requirements_covered", "claims_have_evidence", "human_review_before_submission"]
