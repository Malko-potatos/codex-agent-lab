[agent]
id = "09-document-automation-system"
name = "내 문서 자동생성 시스템"
status = "idea"
base = "codex"
visibility = "public-skeleton-only"

[scope]
goal = "반복 발생 문서를 template과 structured data로 초안 생성한다."
target_users = ["대표", "운영 담당자", "재무/총무 담당자"]
non_goals = ["실제 급여/세금/계약 데이터 저장", "승인 없는 발행", "법률/세무 최종 판단"]

[inputs]
required = ["문서 유형", "대상", "핵심 데이터", "템플릿"]
optional = ["발행일", "문서번호", "결재선", "첨부파일"]
sensitive = ["급여정보", "세금정보", "계약정보", "개인정보", "계좌정보"]

[outputs]
primary = ["문서 초안", "데이터 검증 결과", "발송 전 체크리스트"]
formats = ["markdown", "docx-draft", "xlsx-draft", "hwp-future", "pdf-future"]

[tools]
required = ["template_engine", "local_document_generation"]
optional = ["spreadsheet_generation", "pdf_export", "hwp_converter"]
external_services = []

[safety]
human_review_required = true
external_actions_default = "dry_run"
approval_required_for = ["generate_sensitive_document", "send_document", "upload_file", "issue_tax_invoice"]
data_policy = "Do not commit payroll, tax invoices, contracts, bank accounts, or personal data."

[workflow]
steps = ["select_document_type", "validate_required_fields", "merge_template", "produce_review_checklist"]
validation = ["sensitive_fields_masked", "required_fields_present", "human_approval_before_issue"]
